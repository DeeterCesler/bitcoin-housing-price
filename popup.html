<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Home Prices in Bitcoin</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #1f1f1f;
        --muted: #6b7280;
        --accent: #f7931a;
        --border: #e5e7eb;
      }
      body {
        margin: 0;
        padding: 16px;
        width: 260px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      h1 .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
      }
      .rate {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .sub {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
      }
      button {
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--fg);
        cursor: pointer;
      }
      button:hover {
        background: #f9fafb;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .hint {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        color: var(--muted);
        line-height: 1.5;
      }
      .hint kbd {
        font-family: inherit;
        background: #f3f4f6;
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <h1><span class="dot"></span> Home Prices in Bitcoin</h1>
    <div class="rate" id="rate">…</div>
    <div class="sub" id="sub">Loading…</div>
    <div class="row">
      <button id="refresh">Refresh rate</button>
    </div>
    <div class="hint">
      Click the small <kbd>$</kbd> / <kbd>₿</kbd> badge next to any Zillow price to toggle the view globally. Rate is cached for 5 minutes.
    </div>
    <script src="popup.js"></script>
  </body>
</html>
